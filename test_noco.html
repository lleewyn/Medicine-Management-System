<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kết Nối NocoDB - Hệ Thống Thuốc</title>
    <style>
        :root {
            --primary: #0081ff;
            --success: #28a745;
            --danger: #dc3545;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #0066cc;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            background: #e2e3e5;
            color: #383d41;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .data-container {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Kết Nối NocoDB</h2>
        <div class="input-group">
            <label>API Token (xc-token)</label>
            <input type="password" id="apiToken" value=""
                placeholder="Dán API Token của bạn (Có thể tạo trong phần Account > Tokens)">
        </div>
        <div class="input-group">
            <label>Base URL</label>
            <input type="text" id="baseUrl" value="https://nocodb.data4life.top" placeholder="VD: https://nocodb.data4life.top">
        </div>
        <div class="input-group">
            <label>Table ID</label>
            <input type="text" id="tableName" value="ms16b7993d23oc" placeholder="Dán Table ID từ link (VD: ms16b7993d23oc cho Category)">
        </div>
        <button onclick="testConnection()">🚀 Kiểm Tra Ngay</button>
        <div id="status"></div>
    </div>

    <script>
        async function testConnection() {
            const token = document.getElementById('apiToken').value;
            const baseUrl = document.getElementById('baseUrl').value;
            const tableName = document.getElementById('tableName').value;
            const statusDiv = document.getElementById('status');

            if (!token || !tableName || !baseUrl) {
                alert('Vui lòng nhập đủ Token, Base URL và Table ID!');
                return;
            }

            statusDiv.style.display = 'block';
            statusDiv.className = 'loading';
            statusDiv.innerHTML = '⏳ Đang truy vấn dữ liệu từ NocoDB...';

            try {
                // Sử dụng API v2 theo link hệ thống NocoDB đang dùng
                const url = `${baseUrl.replace(/\/$/, '')}/api/v2/tables/${tableName}/records?offset=0&limit=25`;
                const response = await fetch(url, {
                    headers: { 'xc-token': token }
                });

                if (response.ok) {
                    const data = await response.json();
                    statusDiv.className = 'success';

                    let tableHtml = `
                        <b>✅ Kết nối thành công (API v2)!</b><br>
                        - Tìm thấy: <b>${data.list ? data.list.length : 0}</b> dòng dữ liệu.<br>
                        <div class="data-container">
                            <table>
                                <thead>
                                    <tr>
                                        ${data.list.length > 0 ? Object.keys(data.list[0]).map(key => `<th>${key}</th>`).join('') : ''}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.list.map(row => `
                                        <tr>
                                            ${Object.values(row).map(val => `<td>${val}</td>`).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;

                    statusDiv.innerHTML = tableHtml;
                    console.log('Dữ liệu nhận được:', data);
                } else {
                    const errStatus = response.status;
                    let errMsg = 'Lỗi không xác định';
                    try {
                        const errData = await response.json();
                        errMsg = errData.msg || errData.message || JSON.stringify(errData);
                    } catch (e) {
                        errMsg = response.statusText;
                    }
                    throw new Error(`Mã lỗi ${errStatus}: ${errMsg}`);
                }
            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.innerHTML = `❌ <b>Lỗi kết nối:</b><br>${error.message}<br><br><small>Gợi ý: Kiểm tra lại API Token và đảm bảo Tên bảng trùng khớp hoàn toàn.</small>`;
            }
        }
    </script>
</body>

</html>
